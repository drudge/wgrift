root = "."
tmp_dir = "tmp"

[build]
  cmd = "mage wasm && mage build"
  bin = "bin/wgrift"
  args_bin = ["serve"]
  full_bin = ""
  include_ext = ["go", "html"]
  include_dir = ["cmd", "internal", "pkg", "ui"]
  exclude_dir = ["bin", "dist", "deploy", "magefiles", "tmp"]
  exclude_regex = ["\\.wasm$", "wasm_exec\\.js$"]
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = 500

[log]
  time = false

[misc]
  clean_on_exit = true
