name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test ./internal/...

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Build WASM
        run: |
          GOOS=js GOARCH=wasm go build \
            -ldflags "-s -w -X github.com/drudge/wgrift/pkg/version.Version=$VERSION -X github.com/drudge/wgrift/pkg/version.Commit=$GITHUB_SHA -X github.com/drudge/wgrift/pkg/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o wgrift.wasm ./ui/web

      - name: Build linux/amd64
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags "-s -w -X github.com/drudge/wgrift/pkg/version.Version=$VERSION -X github.com/drudge/wgrift/pkg/version.Commit=$GITHUB_SHA -X github.com/drudge/wgrift/pkg/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o wgrift-linux-amd64 ./cmd/wgrift

      - name: Build linux/arm64
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build \
            -ldflags "-s -w -X github.com/drudge/wgrift/pkg/version.Version=$VERSION -X github.com/drudge/wgrift/pkg/version.Commit=$GITHUB_SHA -X github.com/drudge/wgrift/pkg/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o wgrift-linux-arm64 ./cmd/wgrift

      - name: Package release assets
        run: |
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" . 2>/dev/null || \
            cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" . 2>/dev/null || true

          # amd64 tarball
          mkdir -p wgrift-${VERSION}-linux-amd64
          cp wgrift-linux-amd64 wgrift-${VERSION}-linux-amd64/wgrift
          cp wgrift.wasm wasm_exec.js ui/web/index.html wgrift-${VERSION}-linux-amd64/
          cp deploy/wgrift.service deploy/config.yaml deploy/install.sh wgrift-${VERSION}-linux-amd64/
          tar czf wgrift-${VERSION}-linux-amd64.tar.gz wgrift-${VERSION}-linux-amd64/

          # arm64 tarball
          mkdir -p wgrift-${VERSION}-linux-arm64
          cp wgrift-linux-arm64 wgrift-${VERSION}-linux-arm64/wgrift
          cp wgrift.wasm wasm_exec.js ui/web/index.html wgrift-${VERSION}-linux-arm64/
          cp deploy/wgrift.service deploy/config.yaml deploy/install.sh wgrift-${VERSION}-linux-arm64/
          tar czf wgrift-${VERSION}-linux-arm64.tar.gz wgrift-${VERSION}-linux-arm64/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            wgrift-${{ env.VERSION }}-linux-amd64.tar.gz
            wgrift-${{ env.VERSION }}-linux-arm64.tar.gz
