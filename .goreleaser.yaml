version: 2

before:
  hooks:
    - sh -c 'GOOS=js GOARCH=wasm GOWASM=satconv,signext go build -ldflags "-s -w -X github.com/drudge/wgrift/pkg/version.Version={{ .Version }} -X github.com/drudge/wgrift/pkg/version.Commit={{ .Commit }} -X github.com/drudge/wgrift/pkg/version.Date={{ .Date }}" -o ui/web/wgrift.wasm ./ui/web'
    - sh -c 'rm -f ui/web/wasm_exec.js && GOROOT=$(go env GOROOT) && { cp "$GOROOT/lib/wasm/wasm_exec.js" ui/web/wasm_exec.js 2>/dev/null || cp "$GOROOT/misc/wasm/wasm_exec.js" ui/web/wasm_exec.js; }'
    - sh -c 'gzip -9 -k -f ui/web/wgrift.wasm && { brotli -9 -k -f ui/web/wgrift.wasm 2>/dev/null || cp ui/web/wgrift.wasm.gz ui/web/wgrift.wasm.br; }'

builds:
  - id: wgrift
    main: ./cmd/wgrift
    binary: wgrift
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/drudge/wgrift/pkg/version.Version={{.Version}}
      - -X github.com/drudge/wgrift/pkg/version.Commit={{.Commit}}
      - -X github.com/drudge/wgrift/pkg/version.Date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    files:
      - src: deploy/wgrift.service
        strip_parent: true
      - src: deploy/config.yaml
        strip_parent: true
      - src: deploy/install.sh
        strip_parent: true

dockers_v2:
  - id: wgrift
    ids: [wgrift]
    dockerfile: deploy/docker/Dockerfile
    extra_files:
      - deploy/docker/docker-entrypoint.sh
      - deploy/config.yaml
    images:
      - "ghcr.io/drudge/wgrift"
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.title": "wgRift"
      "org.opencontainers.image.description": "WireGuard VPN management platform"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.source": "https://github.com/drudge/wgrift"
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.revision": "{{ .Commit }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: drudge
    name: wgrift
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## What's Changed
  footer: |
    ---
    **Full Changelog**: https://github.com/drudge/wgrift/compare/{{ .PreviousTag }}...{{ .Tag }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
