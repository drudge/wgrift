services:
  wgrift:
    image: ghcr.io/drudge/wgrift:latest
    # Or build locally (requires pre-built binary):
    # build:
    #   context: .
    #   dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - wgrift-config:/etc/wgrift
      - wgrift-data:/var/lib/wgrift
      - wireguard:/etc/wireguard
    environment:
      # WGRIFT_MASTER_KEY: ""       # Required — base64-encoded 32-byte key
      # WGRIFT_LISTEN: "0.0.0.0:8080"
      # WGRIFT_DEMO_MODE: "false"
      # WGRIFT_SMTP_PASSWORD: ""
    # Note: With network_mode: host, the container shares the host network.
    # wgRift listens on 0.0.0.0:8080 by default.
    # The host must have the WireGuard kernel module loaded.

volumes:
  wgrift-config:
  wgrift-data:
  wireguard:
