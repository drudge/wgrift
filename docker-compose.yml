services:
  wgrift:
    image: ghcr.io/drudge/wgrift:latest
    # Or build locally:
    # build: .
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - "8080:8080"       # Web UI
      - "51820:51820/udp" # WireGuard (adjust to match your interface listen port)
    volumes:
      - wgrift-config:/etc/wgrift
      - wgrift-data:/var/lib/wgrift
      - wireguard:/etc/wireguard
    environment:
      # WGRIFT_MASTER_KEY: ""       # Required — base64-encoded 32-byte key
      # WGRIFT_LISTEN: "0.0.0.0:8080"
      # WGRIFT_DEMO_MODE: "false"
      # WGRIFT_SMTP_PASSWORD: ""
    # The host must have the WireGuard kernel module loaded (modprobe wireguard).
    # Map additional UDP ports if you create multiple WireGuard interfaces.
    #
    # For host networking (simpler routing, no port mapping needed):
    #   network_mode: host
    #   # Remove the "ports" section above when using host networking.

volumes:
  wgrift-config:
  wgrift-data:
  wireguard:
